name: Build Android IME APK

on:
  push:
    branches: [ main ]
    paths: [ 'android-ime/**', '.github/workflows/build-android.yml', 'client/public/icon-512.png' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses || true

      - name: Copy app icon from PWA
        run: |
          mkdir -p android-ime/app/src/main/res/mipmap-xxxhdpi
          cp client/public/icon-512.png android-ime/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp client/public/icon-512.png android-ime/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          rm -rf android-ime/app/src/main/res/mipmap-anydpi-v26

      - name: Create persistent signing keystore
        run: |
          KEYSTORE_PATH="$HOME/.android/debug.keystore"
          mkdir -p "$HOME/.android"
          # Generate a deterministic debug keystore so every build produces
          # the same signature — this prevents "app conflicts" on updates
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore "$KEYSTORE_PATH" \
            -storepass android \
            -dname "CN=Smart Dictation,OU=Dev,O=Majesticaxt,L=Lagos,S=Lagos,C=NG" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        working-directory: android-ime
        run: gradle wrapper --gradle-version 8.2

      - name: Build debug APK
        working-directory: android-ime
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartDictation
          path: android-ime/app/build/outputs/apk/debug/SmartDictation-debug.apk
          retention-days: 7
