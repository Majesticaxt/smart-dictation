name: Build Android IME APK

on:
  push:
    branches: [ main ]
    paths: [ 'android-ime/**' ]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-ime/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Make gradlew executable
        run: chmod +x android-ime/gradlew

      - name: Download Gradle wrapper JAR
        working-directory: android-ime
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Build debug APK
        working-directory: android-ime
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartDictationIME-debug
          path: android-ime/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
